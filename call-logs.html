<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Plus Jakarta Sans",sans-serif;background:var(--bg-canvas);min-height:100vh;overflow-x:hidden;}

.ambient-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(163,255,18,.06) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(6,182,212,.05) 0%,transparent 55%),var(--bg-canvas);}
100%{filter:hue-rotate(15deg)}}

.glass-nav{background:rgba(255,255,255,0.82);backdrop-filter:blur(28px) saturate(140%);-webkit-backdrop-filter:blur(28px) saturate(140%);border-bottom:1px solid rgba(255,255,255,0.5);box-shadow:0 1px 0 rgba(163,255,18,0.04);}
.glass-card{background:rgba(255,255,255,0.62);backdrop-filter:blur(20px) saturate(130%);-webkit-backdrop-filter:blur(20px) saturate(130%);border:1px solid rgba(255,255,255,0.5);box-shadow:0 4px 24px rgba(163,255,18,0.05),0 1px 0 rgba(255,255,255,0.8) inset;}
.glass-card-solid{background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.6);box-shadow:0 4px 24px rgba(163,255,18,0.06);}

.transition-snappy{transition:all 0.22s cubic-bezier(0.25,1,0.5,1);}
.card-hover{transition:transform 0.22s cubic-bezier(0.25,1,0.5,1),box-shadow 0.22s cubic-bezier(0.25,1,0.5,1);}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(163,255,18,0.08),0 1px 0 rgba(255,255,255,0.8) inset;}

.nav-item{position:relative;transition:color 0.18s ease;}
.nav-item.active{color:var(--accent-electric);}

@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.enter{opacity:0;animation:slideUp 0.4s cubic-bezier(0.25,1,0.5,1) forwards;}
.enter-1{animation-delay:.05s}.enter-2{animation-delay:.10s}.enter-3{animation-delay:.15s}.enter-4{animation-delay:.20s}.enter-5{animation-delay:.25s}

.md-icon{font-family:'Material Symbols Outlined';font-style:normal;font-weight:300;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;line-height:1;user-select:none;}
.credit-stripe{background:linear-gradient(135deg,var(--neon-emerald) 0%,var(--neon-cyan) 100%);}

/* Status badges — dark-mode safe */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;}
.badge-completed  {background:rgba(74,222,128,.12); color:var(--accent-mint);border:1px solid rgba(74,222,128,.22);}
.badge-failed     {background:rgba(244,63,94,.12);  color:var(--accent-coral);border:1px solid rgba(244,63,94,.22);}
.badge-no-answer  {background:rgba(251,191,36,.12); color:var(--accent-amber);border:1px solid rgba(251,191,36,.22);}
.badge-in_progress,.badge-in-progress{background:rgba(167,139,250,.12);color:var(--accent-violet);border:1px solid rgba(167,139,250,.22);}

/* Transcript drawer — Neo-Glass dark */
.drawer-overlay{position:fixed;inset:0;background:rgba(5,5,5,.60);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer-panel{position:fixed;top:0;right:0;bottom:0;width:min(540px,100vw);
  background:rgba(14,20,32,0.96);backdrop-filter:blur(28px) saturate(140%);
  border-left:1px solid rgba(163,255,18,0.09);
  z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,1,.5,1);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:-12px 0 48px rgba(0,0,0,0.6);}
.drawer-panel.open{transform:translateX(0);}

/* Jurisdiction pill — dark-mode safe */

.jur-US{background:rgba(96,165,250,.12); color:#93c5fd;border:1px solid rgba(96,165,250,.22);}
.jur-AE{background:rgba(251,146,60,.12); color:#fdba74;border:1px solid rgba(251,146,60,.22);}

.log-row{transition:background 0.15s ease;}
.log-row:hover{background:rgba(163,255,18,0.03);}
.filter-btn{background:transparent;cursor:pointer;}
.filter-btn.active{background:rgba(163,255,18,0.10);color:var(--accent-electric);border-color:rgba(163,255,18,0.25)!important;}

/* Live indicator */

.live-dot{animation:livePulse 2.2s ease-in-out infinite;width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;}

/* Transcript bubble */
.transcript-bubble-agent{background:rgba(163,255,18,0.07);border:1px solid rgba(163,255,18,0.12);border-radius:12px 12px 12px 4px;padding:10px 14px;font-size:13px;line-height:1.6;color:#f1f5f9;}
.transcript-bubble-user{background:rgba(34,211,238,0.07);border:1px solid rgba(34,211,238,0.12);border-radius:12px 12px 4px 12px;padding:10px 14px;font-size:13px;line-height:1.6;color:#f1f5f9;margin-left:auto;}

/* Drawer interior overrides */

.drawer-panel .bg-surface-container-high { background:rgba(255,255,255,.05) !important; }

@media(max-width:768px){.nav-scroll{overflow-x:auto}}
</style>

<script>
const PAGE_SIZE = 20;
let allLogs = [], filtered = [], currentPage = 1, currentFilter = 'all';
let campaignMap = {}; // id → name cache

// ── Helpers ──────────────────────────────────────────────────────
function fmtDuration(secs) {
  if (!secs) return '—';
  return `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')}`;
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000)   return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000)return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (diff < 172800000) return 'Yesterday ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
// Normalise DB underscore status to display form
function normStatus(s) { return (s||'').replace(/_/g,'-'); }

function statusBadge(rawStatus) {
  const s = normStatus(rawStatus);
  const map = {
    'completed':   `<span class="badge badge-completed"><span style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block"></span>Completed</span>`,
    'failed':      `<span class="badge badge-failed"><span style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block"></span>Failed</span>`,
    'no-answer':   `<span class="badge badge-no-answer"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block"></span>No Answer</span>`,
    'in-progress': `<span class="badge badge-in-progress"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent-electric);display:inline-block"></span>In Progress</span>`,
  };
  return map[s] || map['failed'];
}

function jurPill(jur) {
  if (!jur) return '';
  const cls = `jur-${jur}`;
  const flag = {IN:'🇮🇳',US:'🇺🇸',AE:'🇦🇪'}[jur] || '';
  return `<span class="text-[11px] font-semibold px-2 py-0.5 rounded-full ${cls} ml-1">${flag} ${jur}</span>`;
}

function animCounter(el, v, d=800) {
  let s = null;
  const f = t => {
    if (!s) s = t;
    const p = Math.min((t - s) / d, 1);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(e * v);
    if (p < 1) requestAnimationFrame(f);
  };
  requestAnimationFrame(f);
}

// ── Stats ─────────────────────────────────────────────────────────
function updateStats() {
  const comp = allLogs.filter(l => normStatus(l.status) === 'completed').length;
  const fail = allLogs.filter(l => ['failed','no-answer'].includes(normStatus(l.status))).length;
  animCounter(document.getElementById('stat-total'),     allLogs.length);
  animCounter(document.getElementById('stat-completed'), comp);
  animCounter(document.getElementById('stat-failed'),    fail);
  const rate = allLogs.length ? Math.round(comp / allLogs.length * 100) : 0;
  document.getElementById('stat-rate').textContent = rate + '%';
}

// ── Render ────────────────────────────────────────────────────────
function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);
  const list  = document.getElementById('logs-list');
  document.getElementById('log-count').textContent  = `${filtered.length} calls`;
  document.getElementById('page-label').textContent = `${currentPage} / ${Math.max(1, Math.ceil(filtered.length / PAGE_SIZE))}`;

  if (!page.length) {
    list.innerHTML = `
      <div class="px-6 py-16 flex flex-col items-center gap-3 text-on-surface-variant">
        <span class="md-icon text-[48px] opacity-30">call_end</span>
        <p class="text-[14px] font-semibold text-on-surface">No calls yet</p>
        <p class="text-[13px] opacity-70">Execute a campaign to start seeing calls here.</p>
      </div>`;
    return;
  }

  list.innerHTML = page.map((l, i) => {
    const campName = campaignMap[l.campaign_id] || '—';
    const cost = l.cost_credits ? `₡${parseFloat(l.cost_credits).toFixed(3)}` : '—';
    return `
    <div class="log-row grid grid-cols-[2fr_1.2fr_1fr_0.8fr_0.8fr_0.8fr_60px] items-center px-6 py-4 border-b border-outline-variant/20 last:border-0 cursor-pointer"
         onclick="openDrawer('${l.id}')" style="animation:slideUp 0.35s cubic-bezier(0.25,1,0.5,1) ${i*0.03}s both;">
      <div>
        <div class="flex items-center gap-1">
          <span class="text-[13.5px] font-semibold text-on-surface">${l.contact_name || '—'}</span>
          ${jurPill(l.jurisdiction)}
        </div>
        <div class="text-[12px] text-on-surface-variant font-mono">${l.contact_phone || '—'}</div>
      </div>
      <div class="hidden md:block text-[13px] text-on-surface-variant truncate pr-2">${campName}</div>
      <div>${statusBadge(l.status)}</div>
      <div class="hidden md:block text-[13px] font-mono text-on-surface-variant">${fmtDuration(l.duration_seconds)}</div>
      <div class="hidden md:block text-[12.5px] font-semibold text-on-surface-variant">${cost}</div>
      <div class="hidden md:block text-[12.5px] text-on-surface-variant">${fmtTime(l.created_at)}</div>
      <div class="flex justify-end">
        <button onclick="openDrawer('${l.id}')" class="w-8 h-8 rounded-lg hover:bg-surface-container flex items-center justify-center transition-snappy">
          <span class="md-icon text-[17px] text-on-surface-variant">chevron_right</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── Filter ────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f; currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  // Map filter id → button id (in-progress has hyphen)
  const btnId = 'f-' + f;
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');
  filterLogs();
}
function filterLogs() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filtered = allLogs.filter(l => {
    const s = normStatus(l.status);
    const mF = currentFilter === 'all' || s === currentFilter;
    const campName = (campaignMap[l.campaign_id] || '').toLowerCase();
    const mQ = !q
      || (l.contact_name || '').toLowerCase().includes(q)
      || (l.contact_phone || '').includes(q)
      || campName.includes(q)
      || (l.vapi_call_id || '').includes(q);
    return mF && mQ;
  });
  currentPage = 1; renderPage();
}
function changePage(d) {
  const max = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  currentPage = Math.min(max, Math.max(1, currentPage + d));
  renderPage();
}

// ── Transcript drawer ─────────────────────────────────────────────
function openDrawer(id) {
  const l = allLogs.find(x => x.id === id); if (!l) return;
  const campName = campaignMap[l.campaign_id] || '—';
  const cost = l.cost_credits ? `₡${parseFloat(l.cost_credits).toFixed(4)}` : '—';

  document.getElementById('drawer-title').textContent = l.contact_name || 'Unknown Contact';
  document.getElementById('drawer-subtitle').textContent = `${l.contact_phone || '—'} · ${fmtTime(l.created_at)}`;

  document.getElementById('drawer-body').innerHTML = `
    <!-- Status + meta grid -->
    <div class="grid grid-cols-2 gap-3">
      <div class="glass-card rounded-xl p-3">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-1">Status</p>
        ${statusBadge(l.status)}
      </div>
      <div class="glass-card rounded-xl p-3">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-1">Jurisdiction</p>
        <p class="text-[13.5px] font-semibold text-on-surface">${jurPill(l.jurisdiction)} ${l.jurisdiction || '—'}</p>
      </div>
      <div class="glass-card rounded-xl p-3">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-1">Duration</p>
        <p class="text-[15px] font-bold font-mono text-on-surface">${fmtDuration(l.duration_seconds)}</p>
      </div>
      <div class="glass-card rounded-xl p-3">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-1">Cost</p>
        <p class="text-[15px] font-bold text-on-surface">${cost}</p>
      </div>
    </div>

    <!-- Campaign -->
    <div class="glass-card rounded-xl p-4">
      <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-1">Campaign</p>
      <p class="text-[13.5px] font-semibold text-on-surface">${campName}</p>
      ${l.vapi_call_id ? `<p class="text-[11px] font-mono text-on-surface-variant mt-1 opacity-70">Vapi ID: ${l.vapi_call_id}</p>` : ''}
    </div>

    <!-- AI Summary -->
    ${l.summary ? `
    <div class="glass-card rounded-xl p-4">
      <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-2">AI Summary</p>
      <p class="text-[13.5px] text-on-surface leading-relaxed">${l.summary}</p>
    </div>` : ''}

    <!-- Timestamps -->
    <div class="glass-card rounded-xl p-4 space-y-2">
      <p class="text-[11px] font-semibold uppercase tracking-wider text-outline mb-2">Timestamps</p>
      <div class="flex items-center justify-between">
        <span class="text-[12.5px] text-on-surface-variant">Created</span>
        <span class="text-[12.5px] font-mono text-on-surface">${l.created_at ? new Date(l.created_at).toLocaleString('en-IN') : '—'}</span>
      </div>
      ${l.updated_at ? `<div class="flex items-center justify-between">
        <span class="text-[12.5px] text-on-surface-variant">Updated</span>
        <span class="text-[12.5px] font-mono text-on-surface">${new Date(l.updated_at).toLocaleString('en-IN')}</span>
      </div>` : ''}
    </div>
  `;

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-panel').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer-panel').classList.remove('open');
}

// ── Data loading ──────────────────────────────────────────────────
async function loadCampaignNames() {
  const { data } = await window.supabase
    .from('outbound_campaigns')
    .select('id, campaign_name');
  if (data) data.forEach(c => { campaignMap[c.id] = c.campaign_name; });
}

async function loadLogs() {
  document.getElementById('logs-list').innerHTML = `
    ${[1,2,3,4,5].map((_, i) => `
    <div class="px-6 py-4 border-b border-outline-variant/20 last:border-0" style="opacity:${1 - i*0.15}">
      <div class="grid grid-cols-[2fr_1.2fr_1fr_0.8fr_0.8fr_0.8fr_60px] items-center gap-3">
        <div class="space-y-1.5"><div class="skeleton h-3.5 rounded w-32"></div><div class="skeleton h-3 rounded w-24"></div></div>
        <div class="skeleton h-3 rounded w-28 hidden md:block"></div>
        <div class="skeleton h-5 rounded-full w-20"></div>
        <div class="skeleton h-3 rounded w-12 hidden md:block"></div>
        <div class="skeleton h-3 rounded w-10 hidden md:block"></div>
        <div class="skeleton h-3 rounded w-14 hidden md:block"></div>
        <div class="skeleton h-7 w-7 rounded-lg ml-auto"></div>
      </div>
    </div>`).join('')}`;

  const { data, error } = await window.supabase
    .from('call_logs')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(500);

  if (error) {
    document.getElementById('logs-list').innerHTML = `
      <div class="px-6 py-16 flex flex-col items-center gap-4 text-on-surface-variant">
        <span class="md-icon text-[48px] opacity-30">cloud_off</span>
        <p class="text-[14px] font-semibold text-on-surface">Failed to load logs</p>
        <p class="text-[13px] opacity-70">${error.message}</p>
        <button onclick="loadLogs()" class="px-4 py-2 credit-stripe text-white text-[13px] font-semibold rounded-xl">Retry</button>
      </div>`;
    return;
  }

  allLogs = (data || []).map(l => ({
    ...l,
    contact_name:  l.contact_name  || l.recipient_name  || '',
    contact_phone: l.contact_phone || l.recipient_phone || '',
  }));
  filtered = [...allLogs];
  updateStats();
  filterLogs();

  const now = new Date();
  document.getElementById('last-refresh').textContent = `Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

// ── CSV export ────────────────────────────────────────────────────
function exportCSV() {
  if (!filtered.length) return;
  const headers = ['contact_name','contact_phone','campaign','status','duration_seconds','cost_credits','jurisdiction','vapi_call_id','created_at'];
  const rows = filtered.map(l => [
    l.contact_name || '',
    l.contact_phone || '',
    campaignMap[l.campaign_id] || '',
    l.status || '',
    l.duration_seconds || '',
    l.cost_credits || '',
    l.jurisdiction || '',
    l.vapi_call_id || '',
    l.created_at || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href:url, download:`call-logs-${Date.now()}.csv`});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Init ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await checkMaintenanceMode();
  const user = await protectPage(); if (!user) return;
  window._cdUser = user;
  const{data:{session}}=await window.supabase.auth.getSession();
  window._cdSession = session;

  // Avatar (guard against missing elements — sidebar handles its own avatar)
  const name = user.display_name || user.email || '';
  const initEl = document.getElementById('avatar-initials');
  const emailEl = document.getElementById('user-email-short');
  if (initEl) initEl.textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?';
  if (emailEl) emailEl.textContent = (user.email || '').split('@')[0];

  await loadLogs();

  // ── Supabase Realtime — live call status updates ──────────────
  try {
    window.supabase
      .channel('call_logs_live')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'call_logs',
      }, (payload) => {
        const updated = payload.new;
        // Find row in allLogs and update it
        const idx = allLogs.findIndex(l => l.id === updated.id);
        if (idx !== -1) {
          allLogs[idx] = { ...allLogs[idx], ...dbToLog(updated) };
          filtered = allLogs.filter(l => activeFilter === 'all' || l.status === activeFilter);
          renderPage();
          // Flash the up          // Flash the updated row briefly to signal change
          const rowEl = document.querySelector(`[data-log-id="${updated.id}"]`);
          if (rowEl) {
            rowEl.style.transition = 'background 0.3s';
            rowEl.style.background = 'rgba(52,211,153,0.12)';
            setTimeout(() => { rowEl.style.background = ''; }, 1200);
          }
        }
      })
      .subscribe();
  } catch(e) {
    console.warn('[Realtime] Could not subscribe to call_logs_live:', e);
  }
});
</script>
