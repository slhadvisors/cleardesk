<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClearDesk — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/spatial.css"/>
<style>
.auth{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{width:100%;max-width:412px;background:var(--mat);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e2),var(--glass-edge);padding:36px 34px}
.auth-brand{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.auth-logo{width:34px;height:34px;border-radius:10px;background:var(--accent);display:grid;place-items:center;box-shadow:0 6px 18px rgba(30,111,224,.4)}
.auth-logo svg{width:19px;height:19px}
.auth-word{font-weight:700;font-size:18px}
.auth-card h1{font-size:23px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.auth-card .lead{color:var(--text-muted);font-size:14.5px;margin-bottom:26px}
.back{margin-top:22px;text-align:center;font-size:14px;color:var(--text-muted)}
.back a{color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <div class="auth-brand"><span class="auth-logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></span><span class="auth-word">ClearDesk</span></div>
    <h1>Reset your password</h1>
    <p class="lead">Enter the email associated with your workspace and we'll send a secure reset link.</p>
    <form onsubmit="return false">
      <div class="field"><label for="email">Email address</label><input class="input" id="email" type="email" placeholder="you@firm.com" autocomplete="email"/></div>
      <button class="btn btn-primary btn-block" type="submit">Send reset link</button>
    </form>
    <p class="back">Remembered it? <a href="login.html">Back to sign in</a></p>
  </div>
</div>
</body>
</html>
