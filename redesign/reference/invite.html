<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClearDesk — Accept invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/spatial.css"/>
<style>
.auth{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{width:100%;max-width:440px;background:var(--mat);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e2),var(--glass-edge);padding:36px 34px}
.auth-brand{display:flex;align-items:center;gap:11px;margin-bottom:22px}
.auth-logo{width:34px;height:34px;border-radius:10px;background:var(--accent);display:grid;place-items:center;box-shadow:0 6px 18px rgba(30,111,224,.4)}
.auth-logo svg{width:19px;height:19px}
.auth-word{font-weight:700;font-size:18px}
.invite-banner{display:flex;align-items:center;gap:12px;background:var(--accent-soft);border-radius:var(--r-md);padding:14px;margin-bottom:22px}
.invite-banner .ib-av{width:40px;height:40px;border-radius:11px;background:linear-gradient(150deg,var(--accent),#7c5cff);color:#fff;display:grid;place-items:center;font-weight:700;flex:0 0 40px}
.invite-banner .t{font-size:14px;font-weight:600}.invite-banner .s{font-size:12.5px;color:var(--text-muted)}
.auth-card h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.auth-card .lead{color:var(--text-muted);font-size:14px;margin-bottom:24px}
.fine{font-size:12px;color:var(--text-subtle);text-align:center;margin-top:18px}
</style>
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <div class="auth-brand"><span class="auth-logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></span><span class="auth-word">ClearDesk</span></div>

    <div class="invite-banner">
      <span class="ib-av">R</span>
      <div><div class="t">Rao &amp; Associates</div><div class="s">Sneha Desai invited you to join as <b>Staff</b></div></div>
    </div>

    <h1>Accept your invitation</h1>
    <p class="lead">Set up your account to join the workspace.</p>
    <form onsubmit="return false">
      <div class="field"><label for="nm">Full name</label><input class="input" id="nm" placeholder="Your name" autocomplete="name"/></div>
      <div class="field"><label for="em">Work email</label><input class="input" id="em" type="email" value="tanvi@raoassociates.in" readonly style="color:var(--text-muted)"/></div>
      <div class="field"><label for="pw">Create password</label><input class="input" id="pw" type="password" placeholder="At least 8 characters" autocomplete="new-password"/><p class="help">Use 8+ characters with a mix of letters and numbers.</p></div>
      <button class="btn btn-primary btn-block" type="submit">Join workspace</button>
    </form>
    <p class="fine">By joining, you agree to ClearDesk's Terms and Privacy Policy.</p>
  </div>
</div>
</body>
</html>
