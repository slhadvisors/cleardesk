<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClearDesk - SMS Logs</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet"/>
<style>
body {
    background: linear-gradient(135deg, #E8EAF6 0%, #F0F4FF 100%);
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
}
.glass-card {
    background-color: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px 0 rgba(30, 27, 75, 0.05);
}
.glass-nav {
    background-color: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(32px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
}
.status-delivered { color: #4caf50; }
.status-failed { color: #f44336; }
.status-pending { color: #ff9800; }
.status-sent { color: #2196f3; }
</style>
</head>
<body>
<nav class="glass-nav fixed top-0 left-0 right-0 z-50">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-white/80 p-1.5">
          <img alt="Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2BPWssKIhb8Nh7xzwHxs5Q9cl9UzJinuqYxn4u7G77MxUQp8ToVWRwujRTgS5gpWR-suwz4V4fsm8dW-N0RSaEwm_9Dt37s8jf0olEME9M9cSy9FvfHvcx2gMPkp1H5Dj4YaKufPRsAyon8Tf-vMzrmI7MIrChpJZ6_kSbZGs523Pb4CA2SX-QCxPi-STBDe5ihnSr8ua8SbHBVpbMPSjmkwgd9XbJbO8Y-HpmNSk3lZFsuA8itL13q_6zNTl8kk0paSM8gKI5S4"/>
        </div>
        <span class="text-xl font-semibold">ClearDesk</span>
      </a>
      <div class="flex items-center gap-6">
        <a href="index.html" class="text-sm hover:text-[#4d41df]">Dashboard</a>
        <a href="campaigns.html" class="text-sm hover:text-[#4d41df]">Campaigns</a>
        <a href="contacts.html" class="text-sm hover:text-[#4d41df]">Contacts</a>
        <a href="call-logs.html" class="text-sm hover:text-[#4d41df]">Call Logs</a>
        <a href="sms-logs.html" class="text-sm text-[#4d41df] font-semibold">SMS Logs</a>
        <a href="settings.html" class="text-sm hover:text-[#4d41df]">Settings</a>
        <button id="auth-btn" onclick="signOut()" class="px-4 py-2 bg-[#4d41df] text-white rounded-full text-sm">Logout</button>
      </div>
    </div>
  </div>
</nav>

<main class="pt-24 pb-12 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="mb-8">
      <h1 class="text-4xl font-bold mb-2">SMS Logs</h1>
      <p class="text-lg text-gray-600">Track all outbound SMS messages</p>
    </div>
    
    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="glass-card rounded-xl p-4">
        <p class="text-sm text-gray-600 mb-1">Total SMS</p>
        <p id="stat-total" class="text-2xl font-bold">0</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-sm text-gray-600 mb-1">Delivered</p>
        <p id="stat-delivered" class="text-2xl font-bold text-green-600">0</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-sm text-gray-600 mb-1">Failed</p>
        <p id="stat-failed" class="text-2xl font-bold text-red-600">0</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-sm text-gray-600 mb-1">Delivery Rate</p>
        <p id="stat-rate" class="text-2xl font-bold text-blue-600">0%</p>
      </div>
    </div>
    
    <div id="sms-container" class="space-y-3">
      <div class="glass-card rounded-xl p-6 text-center">
        <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">sms</span>
        <h3 class="text-xl font-semibold mb-2">No messages yet</h3>
        <p class="text-gray-600">Start a campaign to see SMS logs here</p>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script>
let currentUser = null;

async function loadSMSLogs() {
  try {
    const { data, error } = await supabaseClient
      .from('sms_logs')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    // Update stats
    const total = data.length;
    const delivered = data.filter(s => s.status === 'delivered').length;
    const failed = data.filter(s => s.status === 'failed').length;
    const rate = total > 0 ? ((delivered / total) * 100).toFixed(0) : 0;
    
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-delivered').textContent = delivered;
    document.getElementById('stat-failed').textContent = failed;
    document.getElementById('stat-rate').textContent = rate + '%';
    
    // Render logs
    const container = document.getElementById('sms-container');
    
    if (data.length === 0) {
      container.innerHTML = `
        <div class="glass-card rounded-xl p-6 text-center">
          <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">sms</span>
          <h3 class="text-xl font-semibold mb-2">No messages yet</h3>
          <p class="text-gray-600">Start a campaign to see SMS logs here</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = data.map(sms => `
      <div class="glass-card rounded-xl p-4">
        <div class="flex items-start justify-between">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <span class="material-symbols-outlined text-[#4d41df]">sms</span>
              <div>
                <p class="font-semibold">${sms.recipient_name || 'Unknown'}</p>
                <p class="text-sm text-gray-600">${sms.recipient_phone}</p>
              </div>
            </div>
            <p class="text-sm text-gray-700 mt-2 pl-10">"${sms.message}"</p>
          </div>
          
          <div class="flex items-center gap-6">
            <div class="text-right">
              <p class="text-xs text-gray-500">Status</p>
              <p class="font-semibold status-${sms.status}">${sms.status.toUpperCase()}</p>
            </div>
            <div class="text-right">
              <p class="text-xs text-gray-500">Time</p>
              <p class="text-sm">${new Date(sms.created_at).toLocaleString()}</p>
            </div>
          </div>
        </div>
      </div>
    `).join('');
    
  } catch (error) {
    console.error('Error loading SMS:', error);
  }
}

(async () => {
  const session = await getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  
  currentUser = session.user;
  document.getElementById('auth-btn').textContent = session.user.email.split('@')[0];
  
  await loadSMSLogs();
  
  // Refresh every 5 seconds
  setInterval(loadSMSLogs, 5000);
})();
</script>
</body>
</html>
