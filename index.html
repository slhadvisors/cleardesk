/* ─── Helpers ─────────────────────────────────────────────────── */

function animateCounterById(id, target, suffix = '', duration = 950) {
  const el = document.getElementById(id);
  if (!el) return;
  if (isNaN(parseFloat(target))) { el.textContent = target + suffix; return; }
  const numTarget = parseFloat(target);
  const start = performance.now();
  (function tick(now) {
    const p     = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const val   = numTarget * eased;
    el.textContent = (Number.isInteger(numTarget)
      ? Math.round(val)
      : val.toFixed(1)) + suffix;
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = target + suffix;
  })(start);
}

function buildGreeting(name) {
  const h = new Date(Date.now() + 5.5 * 3600 * 1000).getUTCHours();
  if (h >= 5  && h < 12) return `Good morning, ${name} ✨`;
  if (h >= 12 && h < 17) return `Good afternoon, ${name} ☀️`;
  if (h >= 17 && h < 21) return `Good evening, ${name} 🌇`;
  return `Working late, ${name} 🌙`;
}

function fmtAgo(iso) {
  const d = Date.now() - new Date(iso);
  if (d < 60000)     return 'Just now';
  if (d < 3600000)   return `${Math.floor(d / 60000)}m ago`;
  if (d < 86400000)  return `${Math.floor(d / 3600000)}h ago`;
  if (d < 172800000) return 'Yesterday';
  return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

/* ─── Data loaders ────────────────────────────────────────────── */

async function loadStats(onSandbox) {
  const ids = ['total-agents','active-teams','compliance-rate','active-campaigns','credit-balance'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.add('skeleton'); el.style.borderRadius = '6px'; }
  });

  try {
    const db = window.supabase;

    const [{ count: agents }, { count: teams }, { count: campaigns }] = await Promise.all([
      db.from('user_profiles').select('*', { count: 'exact', head: true }),
      db.from('teams').select('*', { count: 'exact', head: true }),
      db.from('outbound_campaigns').select('*', { count: 'exact', head: true }).in('status', ['processing','scheduled']),
    ]);

    animateCounterById('total-agents',    agents    ?? 0);
    animateCounterById('active-teams',    teams     ?? 0);
    animateCounterById('active-campaigns', campaigns ?? 0);

    const { data: org } = await db.from('organizations')
      .select('credit_balance, billing_status').single();

    if (org) {
      animateCounterById('credit-balance', Math.round(org.credit_balance ?? 0));
      const badge = document.getElementById('credit-badge');
      if (org.billing_status === 'guest_trial') {
        onSandbox(true);
        if (badge) badge.textContent = 'Sandbox';
      }
      if (org.billing_status === 'past_due' && badge) {
        badge.textContent = 'Past due';
        badge.style.background = 'rgba(244,63,94,0.14)';
        badge.style.color = '#f43f5e';
      }
    }
  } catch (e) {
    console.warn('[Stats]', e);
  }

  /* Call success rate */
  try {
    const { data: rows } = await window.supabase.from('call_logs').select('status');
    if (rows && rows.length) {
      const rate = Math.round(rows.filter(r => r.status === 'completed').length / rows.length * 100);
      setTimeout(() => animateCounterById('compliance-rate', rate, '%'), 180);
    } else {
      const el = document.getElementById('compliance-rate');
      if (el) el.textContent = '—';
    }
  } catch {
    const el = document.getElementById('compliance-rate');
    if (el) el.textContent = '—';
  }

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('skeleton'); el.style.borderRadius = ''; }
  });
}

async function loadFeed() {
  try {
    const { data: calls } = await window.supabase
      .from('call_logs')
      .select('contact_name, status, created_at')
      .order('created_at', { ascending: false })
      .limit(6);

    if (calls && calls.length) {
      return calls.map(c => {
        const done   = c.status === 'completed';
        const failed = ['failed','no_answer','no-answer'].includes(c.status);
        return {
          icon:  done ? 'call' : failed ? 'call_missed' : 'call_made',
          bg:    done ? 'rgba(74,222,128,0.10)'  : failed ? 'rgba(244,63,94,0.10)'  : 'rgba(163,255,18,0.10)',
          color: done ? '#4ade80'                : failed ? '#f43f5e'               : '#a3ff12',
          text: (done ? 'Call completed' : failed ? 'Call missed' : 'Call in progress') +
                (c.contact_name ? ` — ${c.contact_name}` : ''),
          time: fmtAgo(c.created_at),
        };
      });
    }
  } catch {}
  return [];
}

/* ─── IntelligentDeskWidget ───────────────────────────────────── */
function IntelligentDeskWidget() {
  const [refreshing, setRefreshing] = useState(false);

  /* Trigger IntelligentDesk after mount (gives intelligent-desk.js
     time to run and initialise window.IntelligentDesk) */
  useEffect(() => {
    const timer = setTimeout(() => {
      if (window.IntelligentDesk && typeof window.IntelligentDesk.load === 'function') {
        window.IntelligentDesk.load();
      }
    }, 200);
    return () => clearTimeout(timer);
  }, []);

  const handleRefresh = useCallback(async () => {
    if (refreshing) return;
    setRefreshing(true);
    try {
      const { data: { session } } = await window.supabase.auth.getSession();
      if (!session) return;
      const base = (window.supabase.supabaseUrl || '').replace(/\/$/, '');
      const res  = await fetch(`${base}/functions/v1/generate-insights`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type':  'application/json',
        },
      });
      const data = await res.json();
      if (res.ok && data.insights_generated > 0) {
        window.IntelligentDesk?.load?.();
      }
    } catch (e) {
      console.warn('[Insights]', e.message);
    } finally {
      setRefreshing(false);
    }
  }, [refreshing]);

  return (
    <section id="intelligentDeskWidget"
             className="glass-panel i-desk-widget enter"
             style={{ animationDelay: '0.18s' }}>
      <div className="i-desk-header">
        <div className="i-desk-title-group">
          <div className="i-desk-icon-wrap">🧠</div>
          <div>
            <h2 className="i-desk-title">Intelligent Desk</h2>
            <p className="i-desk-sub">Autonomous AI Financial Data Analyst &amp; Advisory Feed</p>
          </div>
        </div>
        <div className="i-desk-controls">
          <div className="metric-badge-neon-cyan">
            Savings Found:&nbsp;
            <span id="txtTotalSavingsOdometer" className="mono-text">₹0.00</span>
          </div>
          <button id="refresh-insights-btn"
                  className={`refresh-btn${refreshing ? ' refreshing' : ''}`}
                  onClick={handleRefresh}
                  disabled={refreshing}
                  title="Generate fresh AI insights">
            <span className="md-icon" id="refresh-icon" style={{ fontSize: 17 }}>refresh</span>
          </button>
        </div>
      </div>

      {/* Stream target — populated by intelligent-desk.js */}
      <div id="intelligentDeskStream" className="i-desk-stream">
        <div className="stream-fallback-loading">
          <div className="spinner-pulse"/>
          <span>Scanning transaction ledgers…</span>
        </div>
      </div>
    </section>
  );
}

/* ─── Root App ────────────────────────────────────────────────── */
function ClearDeskApp() {
  const [dark,        setDark]        = useState(true);
  const [user,        setUser]        = useState(null);
  const [sandbox,     setSandbox]     = useState(false);
  const [feedItems,   setFeedItems]   = useState(null);
  const [feedLoading, setFeedLoading] = useState(true);
  const [showDev,     setShowDev]     = useState(false);
  const [offline,     setOffline]     = useState({ visible: false, msg: '', type: '' });

  /* ── Theme sync ── */
  useEffect(() => {
    document.body.classList.toggle('theme-dark',  dark);
    document.body.classList.toggle('theme-light', !dark);
  }, [dark]);

  /* ── Connection monitor ── */
  useEffect(() => {
    const goOffline = () =>
      setOffline({ visible: true, msg: 'You appear to be offline', type: 'warn' });
    const goOnline = () => {
      setOffline({ visible: true, msg: 'Back online ✓', type: 'ok' });
      setTimeout(() => setOffline(o => ({ ...o, visible: false })), 2500);
    };
    window.addEventListener('offline', goOffline);
    window.addEventListener('online',  goOnline);
    return () => {
      window.removeEventListener('offline', goOffline);
      window.removeEventListener('online',  goOnline);
    };
  }, []);

  /* ── Bootstrap ── */
  useEffect(() => {
    (async () => {
      try { await checkMaintenanceMode?.(); } catch {}

      const raw = await getCurrentUser?.();
      if (!raw) { location.href = 'login.html'; return; }

      /* Resolve display name */
      let name = raw.display_name || raw.full_name || '';
      if (!name || name === raw.email) {
        try {
          const { data: { session } } = await window.supabase.auth.getSession();
          const meta = session?.user?.user_metadata || {};
          name = meta.full_name || meta.display_name || meta.name || '';
        } catch {}
      }
      if (!name) name = (raw.email || '').split('@')[0];
      name = name.replace(/\b\w/g, c => c.toUpperCase());

      const initials   = name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase()
                          || (name[0] || '?').toUpperCase();
      const firstName  = name.split(' ')[0];

      setUser({ raw, name, initials, firstName, role: raw.role,
                org: raw.organization_name || 'Your Organisation',
                greeting: buildGreeting(name) });

      if (raw.role === 'DEVELOPER') setShowDev(true);

      /* Load data */
      await loadStats(setSandbox);
      const feed = await loadFeed();
      setFeedItems(feed);
      setFeedLoading(false);

      /* Language preference */
      if (raw.preferred_language && typeof setLanguage === 'function') {
        setLanguage(raw.preferred_language);
      }
    })();
  }, []);

  const handleSignOut     = useCallback(() => { if (typeof signOut === 'function') signOut(); }, []);
  const handleThemeToggle = useCallback(() => setDark(d => !d), []);

  return (
    <>
      <AmbientCanvas/>
      <div className="app-shell">
        <TopNav
          user={user}
          onSignOut={handleSignOut}
          dark={dark}
          onThemeToggle={handleThemeToggle}
        />

        <main className="main-content">
          <SandboxBanner show={sandbox}/>

          <GreetingSection user={user}/>

          <IntelligentDeskWidget/>

          <StatsGrid/>

          {/* ── Bottom grid ── */}
          <div className="bottom-grid">

            {/* Quick actions */}
            <div className="enter enter-5">
              <span className="section-label">Quick actions</span>
              <div className="actions-grid">
                <ActionCard
                  href="team-management.html"
                  icon="group"         iconBg="rgba(163,255,18,0.10)"  iconColor="#a3ff12" accentColor="#a3ff12"
                  title="Team Management"  desc="Organise compliance teams and assign roles"
                  delay="0.22s"/>
                <ActionCard
                  href="agent-detail.html"
                  icon="support_agent" iconBg="rgba(74,222,128,0.10)"  iconColor="#4ade80" accentColor="#4ade80"
                  title="Agent Details"    desc="View profiles, performance, and assignments"
                  delay="0.24s"/>
                <ActionCard
                  href="campaigns.html"
                  icon="campaign"      iconBg="rgba(167,139,250,0.10)" iconColor="#a78bfa" accentColor="#a78bfa"
                  title="Campaigns"        desc="Launch outbound calls, chasers and reminders"
                  delay="0.26s"/>
                <ActionCard
                  href="call-logs.html"
                  icon="call_log"      iconBg="rgba(34,211,238,0.10)"  iconColor="#22d3ee" accentColor="#22d3ee"
                  title="Call Logs"        desc="Review transcripts, outcomes, and durations"
                  delay="0.28s"/>
              </div>
            </div>

            {/* Activity feed */}
            <div className="feed-col enter enter-6">
              <div className="feed-header">
                <span className="section-label" style={{ margin: 0 }}>Recent activity</span>
                <div className="live-indicator">
                  <span className="live-dot"/>
                  Live
                </div>
              </div>
              <ActivityFeed items={feedItems} loading={feedLoading}/>
            </div>
          </div>

          <DeveloperSection show={showDev}/>
        </main>

        <div style={{ height: 32 }}/>
      </div>

      <OfflineBanner visible={offline.visible} message={offline.msg} type={offline.type}/>
    </>
  );
}

/* ── Mount ── */
const root = ReactDOM.createRoot(document.getElementById('react-root'));
root.render(<ClearDeskApp/>);
</script>

<!-- intelligent-desk.js runs after React has painted the widget container -->
<script src="intelligent-desk.js"></script>

</body>
</html>
